name: Smoke test

# Runs the Playwright smoke test (scripts/smoke-test.mjs) against a freshly-
# built instance of the app. Catches regressions where a page starts 500'ing
# after a code change before users hit them.
#
# Triggered:
#   - On every push to main
#   - On every pull request targeting main
#   - Nightly at 03:00 UTC (catches deps-broke-overnight cases)
#   - Manually via workflow_dispatch (re-run on demand)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node 22 LTS
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Install dependencies
        # Mirrors the install script's strategy: --ignore-scripts bypasses
        # pnpm 11's build-script gate, then `pnpm rebuild` runs the post-
        # install scripts (better-sqlite3, sharp, esbuild, etc.) explicitly.
        run: |
          pnpm install --ignore-scripts --prefer-offline
          pnpm rebuild

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Apply migrations
        run: node scripts/migrate.cjs

      - name: Build (production)
        run: pnpm build

      - name: Start server in background
        # Bind to all interfaces inside the CI container, port 3000.
        run: |
          PORT=3000 HOSTNAME=0.0.0.0 pnpm start:daily &
          echo $! > /tmp/server.pid

      - name: Wait for health endpoint
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/api/v1/health > /dev/null; then
              echo "Server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start within 60s"
          exit 1

      - name: Run smoke test
        run: node scripts/smoke-test.mjs http://localhost:3000

      - name: Show server logs on failure
        if: failure()
        run: |
          echo "=== dev-server.log ==="
          [ -f dev-server.log ] && tail -200 dev-server.log
          echo "=== process state ==="
          ps aux | grep -E "(node|next)" | head -10

      - name: Stop server
        if: always()
        run: |
          [ -f /tmp/server.pid ] && kill $(cat /tmp/server.pid) 2>/dev/null || true
